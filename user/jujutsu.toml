#:schema https://docs.jj-vcs.dev/latest/config-schema.json

[user]
name = "Khanh Duong"
email = "dqkqdlot@gmail.com"

[signing]
behavior = "own"
backend = "gpg"

[template-aliases]
'format_short_id(id)' = "id.shortest()"

[git]
abandon-unreachable-commits = true
colocate = true

[revset-aliases]
'immutable_heads()' = "builtin_immutable_heads() | (trunk().. & ~mine())"

[ui]
editor = "nvim"
